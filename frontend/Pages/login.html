<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — ReformAí</title>
  <meta name="description" content="Acesse sua conta ReformAí e gerencie suas reformas e profissionais." />

  <!-- Fonte Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Estilos Tailwind CSS -->
  <link rel="stylesheet" href="../src/assets/style.css" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-5px);
      }

      40% {
        transform: translateX(5px);
      }

      60% {
        transform: translateX(-4px);
      }

      80% {
        transform: translateX(4px);
      }
    }

    .input-error {
      animation: shake 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.25s ease forwards;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* Efeito de pressionar o botão (contorno) */
    .btn-outline:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body class="min-h-screen bg-[#f0f0f0] flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-[440px]">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 px-10 py-10">

      <!-- Cabeçalho (centralizado) -->
      <div class="mb-8 text-center">
        <h1 class="text-[26px] font-bold text-slate-900 leading-tight">Bem-vindo de volta</h1>
        <p class="mt-1.5 text-[14px] text-gray-400">Acesse sua conta para gerenciar suas reformas</p>
      </div>

      <!-- Formulário -->
      <form id="login-form" novalidate class="flex flex-col gap-5">

        <!-- Campo: E-mail -->
        <div class="flex flex-col gap-1.5">
          <label for="email" class="text-[13px] font-medium text-slate-700">E-mail</label>
          <div class="relative">
            <input id="email" name="email" type="email" placeholder="Email@exemplo.com" autocomplete="email" class="w-full h-[48px] px-4 pr-11 rounded-lg border border-gray-200 bg-white text-[14px] text-slate-800 placeholder-gray-300
                       focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent
                       transition-all duration-200" />
            <span id="email-icon"
              class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-orange-500 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </span>
          </div>
          <p id="email-error" class="hidden text-[12px] text-orange-500 mt-0.5">Insira um e-mail válido.</p>
        </div>

        <!-- Campo: Senha -->
        <div class="flex flex-col gap-1.5">
          <label for="senha" class="text-[13px] font-medium text-slate-700">Senha</label>
          <div class="relative">
            <input id="senha" name="senha" type="password" placeholder="Sua senha" autocomplete="current-password"
              class="w-full h-[48px] px-4 pr-11 rounded-lg border border-gray-200 bg-white text-[14px] text-slate-800 placeholder-gray-300
                       focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent
                       transition-all duration-200" />
            <span id="senha-icon"
              class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-orange-500 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </span>
          </div>
          <p id="senha-error" class="hidden text-[12px] text-orange-500 mt-0.5">Insira sua senha.</p>

          <!-- Mensagem de erro: credenciais inválidas -->
          <div id="global-error" class="hidden fade-in flex items-center gap-2 text-[13px] text-orange-600 mt-1"
            role="alert" aria-live="polite">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 flex-shrink-0">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            <span>E-mail ou senha inválidos.</span>
          </div>
        </div>

        <!-- Link: Esqueceu a senha (alinhado à direita) -->
        <div class="flex justify-end -mt-2">
          <a href="#" id="forgot-link"
            class="text-[13px] text-orange-500 font-medium hover:text-orange-600 hover:underline transition-colors">
            Esqueceu sua senha?
          </a>
        </div>

        <!-- Botão: Entrar -->
        <button id="btn-entrar" type="submit" class="btn-primary w-full h-[52px] bg-orange-500 hover:bg-orange-600 active:bg-orange-700
                   text-white text-[15px] font-semibold rounded-lg
                   shadow-sm focus:outline-none focus:ring-4 focus:ring-orange-200
                   transition-all duration-200 flex items-center justify-center gap-2">
          <span id="btn-text">Entrar</span>
          <svg id="btn-spinner" class="hidden w-5 h-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
        </button>

        <!-- Botão: Criar Conta (contorno) -->
        <a href="./cadastro.html" id="btn-criar-conta" class="btn-outline w-full h-[52px] border-2 border-orange-500 text-orange-500 text-[15px] font-semibold rounded-lg
                   hover:bg-orange-50 active:bg-orange-100
                   focus:outline-none focus:ring-4 focus:ring-orange-100
                   transition-all duration-200 flex items-center justify-center">
          Criar conta
        </a>

      </form>

      <!-- Termos de uso e privacidade -->
      <p class="mt-7 text-center text-[12px] text-gray-400 leading-relaxed">
        Ao entrar, você concorda com nossos
        <a href="#"
          class="text-orange-500 underline underline-offset-2 hover:text-orange-600 transition-colors">Termos</a>
        e
        <a href="#"
          class="text-orange-500 underline underline-offset-2 hover:text-orange-600 transition-colors">Privacidade</a>.
      </p>

    </div><!-- /cartão principal -->
  </div>

  <script>
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');

    const emailError = document.getElementById('email-error');
    const emailIcon = document.getElementById('email-icon');
    const senhaError = document.getElementById('senha-error');
    const senhaIcon = document.getElementById('senha-icon');
    const globalError = document.getElementById('global-error');

    const btnEntrar = document.getElementById('btn-entrar');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    // Funções auxiliares
    function setError(input, errorEl, iconEl) {
      input.classList.add('border-orange-400', 'bg-orange-50', 'input-error');
      input.classList.remove('border-gray-200', 'bg-white');
      errorEl.classList.remove('hidden');
      if (iconEl) iconEl.classList.remove('hidden');
      setTimeout(() => input.classList.remove('input-error'), 500);
    }

    function clearError(input, errorEl, iconEl) {
      input.classList.remove('border-orange-400', 'bg-orange-50', 'input-error');
      input.classList.add('border-gray-200', 'bg-white');
      errorEl.classList.add('hidden');
      if (iconEl) iconEl.classList.add('hidden');
    }

    function showGlobalError() {
      globalError.classList.remove('hidden');
      globalError.classList.add('fade-in');
    }

    function hideGlobalError() {
      globalError.classList.add('hidden');
      globalError.classList.remove('fade-in');
    }

    // Validação em tempo real ao perder o foco
    emailInput.addEventListener('blur', () => {
      const v = emailInput.value.trim();
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      if (!v || !valid) setError(emailInput, emailError, emailIcon);
      else clearError(emailInput, emailError, emailIcon);
    });

    senhaInput.addEventListener('blur', () => {
      if (!senhaInput.value) setError(senhaInput, senhaError, senhaIcon);
      else clearError(senhaInput, senhaError, senhaIcon);
    });

    // Limpar erro global ao alterar qualquer campo
    [emailInput, senhaInput].forEach(el => el.addEventListener('input', hideGlobalError));

    // Envio do formulário
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;

      const emailVal = emailInput.value.trim();
      if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
        setError(emailInput, emailError, emailIcon);
        valid = false;
      } else clearError(emailInput, emailError, emailIcon);

      if (!senhaInput.value) {
        setError(senhaInput, senhaError, senhaIcon);
        valid = false;
      } else clearError(senhaInput, senhaError, senhaIcon);

      if (!valid) return;

      // Simular carregamento
      btnEntrar.disabled = true;
      btnText.textContent = 'Entrando...';
      btnSpinner.classList.remove('hidden');
      hideGlobalError();

      // TODO: substituir pela chamada real à API
      await new Promise(r => setTimeout(r, 1500));

      btnEntrar.disabled = false;
      btnText.textContent = 'Entrar';
      btnSpinner.classList.add('hidden');

      // Demo: exibir erro de credenciais inválidas
      setError(emailInput, emailError, emailIcon);
      setError(senhaInput, senhaError, senhaIcon);
      emailError.classList.add('hidden');
      senhaError.classList.add('hidden');
      showGlobalError();
    });
  </script>
</body>

</html>
